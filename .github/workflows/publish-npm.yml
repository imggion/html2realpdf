name: Publish npm package
run-name: Publish npm package for ${{ inputs.release_tag }}

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag whose prepared artifact should be published
        required: true
        type: string

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out workflow tools from main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag }}
          fetch-depth: 0
          path: release

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify deploy context
        env:
          REPOSITORY_VISIBILITY: ${{ github.event.repository.visibility }}
        run: |
          if [[ "$REPOSITORY_VISIBILITY" != "public" ]]; then
            echo "npm provenance requires the GitHub repository to be public" >&2
            exit 1
          fi

      - name: Resolve release tag
        id: release
        run: node release/.github/scripts/resolve-release-tag.mjs >> "$GITHUB_OUTPUT"

      - name: Verify requested release tag
        env:
          REQUESTED_TAG: ${{ inputs.release_tag }}
          RESOLVED_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if [[ "$REQUESTED_TAG" != "$RESOLVED_TAG" ]]; then
            echo "Requested $REQUESTED_TAG, but package metadata resolves to $RESOLVED_TAG" >&2
            exit 1
          fi

      - name: Find prepared npm artifact
        id: artifact_run
        uses: actions/github-script@v8
        env:
          ARTIFACT_NAME: npm-package-${{ steps.release.outputs.sha }}
        with:
          result-encoding: string
          script: |
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "prepare-npm-artifact.yml",
              event: "workflow_dispatch",
              status: "success",
              per_page: 100,
            });
            for (const run of runs) {
              const response = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
                name: process.env.ARTIFACT_NAME,
                per_page: 100,
              });
              const artifact = response.data.artifacts.find((candidate) =>
                candidate.name === process.env.ARTIFACT_NAME && !candidate.expired
              );
              if (artifact) return String(run.id);
            }
            throw new Error(
              `No prepared artifact named ${process.env.ARTIFACT_NAME} was found. ` +
              "Run the Prepare npm artifact workflow first."
            );

      - name: Download prepared npm package
        uses: actions/download-artifact@v5
        with:
          name: npm-package-${{ steps.release.outputs.sha }}
          path: ${{ runner.temp }}/npm-package
          github-token: ${{ github.token }}
          run-id: ${{ steps.artifact_run.outputs.result }}

      - name: Validate npm package
        id: package
        env:
          ARTIFACT_DIRECTORY: ${{ runner.temp }}/npm-package
          EXPECTED_VERSION: ${{ steps.release.outputs.version }}
        run: node .github/scripts/validate-npm-tarball.mjs

      - name: Publish package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_VERSION: ${{ steps.release.outputs.version }}
          TARBALL: ${{ steps.package.outputs.tarball }}
        run: |
          if [[ -z "$NODE_AUTH_TOKEN" ]]; then
            echo "The NPM_TOKEN repository secret is not configured" >&2
            exit 1
          fi
          if [[ "$PACKAGE_VERSION" == *-* ]]; then
            npm publish "$TARBALL" --ignore-scripts --access public --provenance --tag next
          else
            npm publish "$TARBALL" --ignore-scripts --access public --provenance --tag latest
          fi
