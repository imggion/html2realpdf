name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install JavaScript dependencies
        run: |
          npm ci --prefix bindings/js
          npm ci --prefix tests/react
          npm ci --prefix tests/web

      - name: Install browser and PDF test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes poppler-utils
          npm --prefix tests/web exec -- playwright install --with-deps chromium firefox webkit

      - name: Run complete release gate
        run: make test-release
